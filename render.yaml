services:
  - type: web
    name: django-portfolio
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn myportfolio.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true          # Render genera un valor seguro automáticamente
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ""                    # Render lo rellena; RENDER_EXTERNAL_HOSTNAME lo agrega el settings.py
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString
      - key: DJANGO_SUPERUSER_USERNAME
        value: admin
      - key: DJANGO_SUPERUSER_EMAIL
        value: juanmanuelmarquezjimenez9@gmail.com          
      - key: DJANGO_SUPERUSER_PASSWORD
        generateValue: true

      # Email (opcional — configura cuando tengas cuenta Gmail/SendGrid)
      # - key: EMAIL_BACKEND
      #   value: django.core.mail.backends.smtp.EmailBackend
      # - key: EMAIL_HOST_USER
      #   value: tu@gmail.com
      # - key: EMAIL_HOST_PASSWORD
      #   value: tu_app_password

      # Cloudinary (opcional — para imágenes de proyectos)
      # - key: CLOUDINARY_CLOUD_NAME
      #   value: tu_cloud_name
      # - key: CLOUDINARY_API_KEY
      #   value: tu_api_key
      # - key: CLOUDINARY_API_SECRET
      #   value: tu_api_secret

databases:
  - name: portfolio-db
    databaseName: portfolio
    user: portfolio_user
    plan: free